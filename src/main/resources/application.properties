spring.application.name=optical-manage
server.port=${SERVER_PORT:8089}

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:your-database-username-here}
spring.datasource.password=${DB_PASSWORD:your-database-password-here}
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto

# 暴露所有端点（生产环境建议只暴露必要的）
management.endpoints.web.exposure.include=*
# 启用健康检查详情
management.endpoint.health.show-details=always

# ==================== LLM 配置 ====================
# 阿里云通义千问 API（或其他 LLM 服务）
llm.api-key=${LLM_API_KEY:your-api-key-here}
llm.api-url=https://dashscope.aliyuncs.com/compatible-mode/v1
llm.model=qwen-plus
llm.temperature=0.1
llm.max-tokens=1000
